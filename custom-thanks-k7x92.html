<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>הטופס התקבל | מלוכה במבחן</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700;900&family=Heebo:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#c9a24b; --gold-light:#e3c886; --gold-dim:#8a6f33;
    --paper:#faf6ec; --serif:'Frank Ruhl Libre',serif; --sans:'Heebo',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:var(--sans); color:var(--paper); line-height:1.8; min-height:100vh;
    display:flex; align-items:center; justify-content:center; padding:30px 16px;
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(201,162,75,.13), transparent 60%),
      linear-gradient(180deg,#0b1c2e 0%, #091624 100%);
  }
  .card{max-width:520px; width:100%; text-align:center;}
  .check{font-size:52px;}
  h1{font-family:var(--serif); color:var(--gold-light); font-size:clamp(28px,6vw,38px); margin:8px 0 6px;}
  .sub{opacity:.9; font-size:17px; margin-bottom:20px;}
  .box{
    background:rgba(14,39,64,.7); border:1px solid var(--gold-dim); border-radius:12px;
    padding:20px 26px; text-align:right; font-size:15.5px;
  }
  .box b{color:var(--gold-light);}
  .small{font-size:14px; opacity:.75; margin-top:18px;}
  .small a{color:var(--gold-light);}
</style>
</head>
<body>
<div class="card">
  <div class="check">📜</div>
  <h1>הטופס התקבל, תודה!</h1>
  <p class="sub">קיבלנו את האפיון שלכם והוא כבר אצלנו על שולחן הממלכה.</p>
  <div class="box">
    <b>מה עכשיו?</b><br>
    נחזור אליכם תוך יום עבודה עם הצעת מחיר מדויקת ולוח זמנים.
    התשובה תגיע למייל שציינתם בטופס, ולפעמים גם בהודעה לטלפון.
  </div>
  <p class="small">לא קיבלתם תשובה תוך יום עבודה? בדקו בתיקיית הספאם, או כתבו לנו:
  <a href="mailto:chayasprint@gmail.com">chayasprint@gmail.com</a></p>
</div>
</body>
</html>
